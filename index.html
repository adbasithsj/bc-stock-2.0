<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BC STOCK 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --primary: #ff4757;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #2ed573;
            --warning: #ffa502;
            --danger: #ff4757;
            --exclude: #3b82f6;
            --excel: #27ae60;
            --pdf: #e74c3c;
            --todo: #a55eea;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 0; line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        header h1 { font-size: 1.8rem; margin: 0; }
        header h1 span { color: var(--primary); }
        .sync-time { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 30px; }
                
        .controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; align-items: center; }
        .search-bar { flex: 1 1 100%; padding: 12px 18px; background: var(--card-bg); border: 1px solid #334155; border-radius: 10px; color: white; font-size: 0.95rem; }
                
        .btn { padding: 10px 14px; border-radius: 10px; border: 1px solid #334155; background: var(--card-bg); color: var(--text-main); cursor: pointer; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: 0.2s; font-size: 0.85rem; white-space: nowrap; }
        .btn:hover { background: #334155; }
        
        .btn-todo { border-color: var(--todo); color: var(--todo); font-weight: bold; }
        .btn-todo:hover { background: rgba(165, 94, 234, 0.1); }

        .price-filter-group { display: flex; align-items: center; gap: 5px; background: var(--card-bg); padding: 5px 10px; border-radius: 10px; border: 1px solid #334155; }
        .price-input { width: 70px; background: transparent; border: none; color: white; font-size: 0.85rem; outline: none; text-align: center; }
        .price-input::placeholder { color: var(--text-dim); }

        .btn.active-low { background: var(--warning); border-color: var(--warning); color: #000; }
        .btn.active-out { background: var(--danger); border-color: var(--danger); color: #fff; }
        .btn.active-exclude { background: var(--exclude); border-color: var(--exclude); color: #fff; }
        .btn-excel { border-color: var(--excel); color: var(--excel); }
        .btn-pdf { border-color: var(--pdf); color: var(--pdf); }
        .btn-reset { background: rgba(100, 116, 139, 0.1); color: var(--text-dim); }

        .view-stats { margin-bottom: 25px; font-size: 0.9rem; color: var(--text-dim); padding-left: 5px; display: flex; justify-content: space-between; }
        #item-count { color: var(--primary); font-weight: 700; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #334155; display: flex; flex-direction: column; justify-content: space-between; min-height: 110px; }
        .price-tag { font-size: 1.3rem; font-weight: 700; margin-bottom: 12px; }
        .price-tag span { font-size: 0.8rem; color: var(--text-dim); }

        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .in-stock { background: rgba(46, 213, 115, 0.1); color: var(--success); }
        .low-stock { background: rgba(255, 165, 2, 0.1); color: var(--warning); }
        .out-stock { background: rgba(255, 71, 87, 0.1); color: var(--danger); }

        /* Modals */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .modal-content { background: var(--card-bg); margin: 5vh auto; padding: 25px; border-radius: 15px; border: 1px solid #334155; width: 90%; max-width: 650px; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: var(--text-dim); }
        
        /* Reminder Specific Styling */
        .rem-modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); }
        .rem-content { background: var(--card-bg); margin: 15vh auto; padding: 30px; border-radius: 20px; border: 2px solid var(--primary); width: 85%; max-width: 450px; text-align: center; box-shadow: 0 0 40px rgba(255, 71, 87, 0.2); }
        .rem-list { text-align: left; margin: 20px 0; max-height: 250px; overflow-y: auto; }
        .rem-item { padding: 12px; border-bottom: 1px solid #334155; display: flex; gap: 12px; align-items: flex-start; }
        .rem-no { color: var(--primary); font-weight: bold; min-width: 20px; }
        .btn-rem-close { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; margin-top: 10px; }

        .todo-section { margin-bottom: 30px; }
        .todo-section h3 { color: var(--primary); border-bottom: 1px solid #334155; padding-bottom: 8px; margin-bottom: 15px; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; }
        .todo-table { width: 100%; border-collapse: collapse; }
        .todo-table td { padding: 12px 8px; border-bottom: 1px solid #334155; font-size: 0.9rem; vertical-align: top; }
        .todo-no { color: var(--primary); font-weight: bold; width: 30px; }
        .loading-text { font-size: 0.8rem; color: var(--text-dim); font-style: italic; }

        footer { text-align: center; margin-top: 50px; color: var(--text-dim); padding-bottom: 30px; }
        @media (min-width: 600px) { .search-bar { flex: 2; min-width: 300px; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🚘 BC <span>STOCK</span> 2.0</h1>
        <div class="sync-time">Last updated: <span id="last-sync">Never</span></div>
    </header>

    <div class="controls">
        <input type="search" id="searchInput" class="search-bar" placeholder="Search... (use '-' to exclude)" oninput="filterAndRender()" autofocus>
        
        <div class="price-filter-group">
            <span>₹</span>
            <input type="number" id="minPrice" class="price-input" placeholder="Min" oninput="filterAndRender()">
            <span style="color:var(--text-dim)">-</span>
            <input type="number" id="maxPrice" class="price-input" placeholder="Max" oninput="filterAndRender()">
        </div>

        <button class="btn btn-todo" onclick="openTodo()">📋 TODO LIST</button>
        <button id="lowStockBtn" class="btn" onclick="toggleFilter('low')">⚠️ Only Low</button>
        <button id="outStockBtn" class="btn" onclick="toggleFilter('out')">🚫 Only Out</button>
        <button id="hideLowBtn" class="btn" onclick="toggleExclusion('low')">👁️ Hide Low</button>
        <button id="hideOutBtn" class="btn" onclick="toggleExclusion('out')">👁️ Hide Out</button>
        <button id="hideZeroBtn" class="btn" onclick="toggleExclusion('zero')">👁️ Hide ₹0</button>
        <button id="sortBtn" class="btn" onclick="toggleSort()">↕️ Price</button>
        
        <button class="btn btn-excel" onclick="exportToExcel()">📊 Excel</button>
        <button class="btn btn-pdf" onclick="exportToPDF()">📄 PDF</button>
        
        <button class="btn btn-reset" onclick="resetAllFilters()">🔄 Reset</button>

        <div style="display: flex; align-items: center; gap: 8px; margin-left: 5px;">
            <input type="text" id="calcInput" class="btn" style="width: 80px; cursor: text; text-align: center;" placeholder="Calc..." oninput="quickCalc()">
            <span id="calcResult" style="font-weight: 700; color: var(--success); font-size: 0.9rem;"></span>
        </div>
    </div>

    <div class="view-stats">
        <span>Showing <span id="item-count">0</span> items</span>
    </div>

    <div id="product-list" class="product-grid"></div>
</div>

<div id="reminderModal" class="rem-modal">
    <div class="rem-content">
        <h2 style="margin-top:0; color:var(--primary); letter-spacing: 1px;">🔔 REMINDER</h2>
        <div id="reminder-body" class="rem-list">
            <p style="text-align:center; color:var(--text-dim);">Fetching reminders...</p>
        </div>
        <button class="btn-rem-close" onclick="closeReminder()">CLOSE REMINDER</button>
    </div>
</div>

<div id="todoModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeTodo()">&times;</span>
        <h2 style="margin-top:0">Work Dashboard</h2>
        <p id="todo-sync-status" class="loading-text" style="margin-bottom:20px;"></p>
        
        <div class="todo-section">
            <h3>☀️ DAILY WORK</h3>
            <div id="daily-list"><p class="loading-text">Fetching tasks...</p></div>
        </div>

        <div class="todo-section">
            <h3>📅 WEEKLY WORK</h3>
            <div id="weekly-list"><p class="loading-text">Fetching tasks...</p></div>
        </div>

        <div class="todo-section">
            <h3>🗓️ MONTHLY WORK</h3>
            <div id="monthly-list"><p class="loading-text">Fetching tasks...</p></div>
        </div>
    </div>
</div>

<footer>Developed by <b style="color:var(--primary)">Ahamed Basith</b></footer>

<script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSR_y2S7ZU4m_Kahe7-_O26-D7uyYOH593XDUrlSdnBZy4uA-58S3_9FlbqTpPqB-dNwFm0iBLrYguo/pub?gid=0&single=true&output=csv";
    
    // GID for Reminders provided by you
    const reminderSheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSR_y2S7ZU4m_Kahe7-_O26-D7uyYOH593XDUrlSdnBZy4uA-58S3_9FlbqTpPqB-dNwFm0iBLrYguo/pub?gid=494717594&single=true&output=csv";

    const taskURLs = {
        daily: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSR_y2S7ZU4m_Kahe7-_O26-D7uyYOH593XDUrlSdnBZy4uA-58S3_9FlbqTpPqB-dNwFm0iBLrYguo/pub?gid=1770873974&single=true&output=csv",
        weekly: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSR_y2S7ZU4m_Kahe7-_O26-D7uyYOH593XDUrlSdnBZy4uA-58S3_9FlbqTpPqB-dNwFm0iBLrYguo/pub?gid=1413648630&single=true&output=csv",
        monthly: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSR_y2S7ZU4m_Kahe7-_O26-D7uyYOH593XDUrlSdnBZy4uA-58S3_9FlbqTpPqB-dNwFm0iBLrYguo/pub?gid=1126899357&single=true&output=csv"
    };

    let products = [];
    let currentlyFiltered = [];
    let currentFilter = 'all';
    let exclusions = { low: false, out: false, zero: false };
    let sortDirection = 'none';

    // --- REMINDER POPUP LOGIC ---
    async function loadReminders() {
        try {
            const response = await fetch(reminderSheetURL);
            const csv = await response.text();
            const rows = csv.split("\n").slice(1);
            
            let html = '';
            let count = 0;

            rows.forEach(row => {
                const cols = row.split(",");
                if (cols.length >= 2 && cols[1].trim() !== "") {
                    count++;
                    html += `
                        <div class="rem-item">
                            <span class="rem-no">${cols[0]}</span>
                            <span>${cols[1].replace(/"/g, '')}</span>
                        </div>`;
                }
            });

            if (count > 0) {
                document.getElementById("reminder-body").innerHTML = html;
                document.getElementById("reminderModal").style.display = "block";
            }
        } catch (e) {
            console.error("Failed to load reminders");
        }
    }

    function closeReminder() {
        document.getElementById("reminderModal").style.display = "none";
    }

    // --- MAIN STOCK LOGIC ---
    async function loadData() {
        try {
            const response = await fetch(sheetURL);
            const csv = await response.text();
            const rows = csv.split("\n").slice(1);
            
            products = rows.map(row => {
                const cols = row.split(",");
                return {
                    name: cols[0]?.trim() || "N/A",
                    stock: parseInt(cols[1]) || 0,
                    price: parseFloat(cols[2]) || 0
                };
            }).filter(p => p.name !== "N/A" && p.name !== "");

            document.getElementById('last-sync').innerText = new Date().toLocaleTimeString();
            filterAndRender();
        } catch (e) {
            document.getElementById('product-list').innerHTML = `<p style="text-align:center; color:var(--danger);">Failed to load data from sheet.</p>`;
        }
    }

    // --- TODO LOGIC ---
async function fetchTasks(url, elementId) {
    try {
        const response = await fetch(url);
        const csv = await response.text();
        // Split by lines, then handle each row
        const rows = csv.split("\n").slice(1);
        
        let html = '<table class="todo-table">';
        rows.forEach(row => {
            // This regex splits only at the FIRST comma found in the line
            const firstCommaIndex = row.indexOf(',');
            if (firstCommaIndex !== -1) {
                const col0 = row.substring(0, firstCommaIndex).trim();
                const col1 = row.substring(firstCommaIndex + 1).trim();
                
                if (col1 !== "") {
                    // Remove quotes if Google Sheets added them automatically
                    const cleanTask = col1.replace(/^"|"$/g, '').replace(/""/g, '"');
                    html += `<tr>
                        <td class="todo-no">${col0}</td>
                        <td>${cleanTask}</td>
                    </tr>`;
                }
            }
        });
        html += '</table>';
        document.getElementById(elementId).innerHTML = html;
    } catch (e) {
        document.getElementById(elementId).innerHTML = '<p style="color:var(--danger);">Load error.</p>';
    }
}

    function openTodo() {
        document.getElementById("todoModal").style.display = "block";
        document.getElementById("todo-sync-status").innerText = "Syncing with Google Sheets...";
        
        Promise.all([
            fetchTasks(taskURLs.daily, 'daily-list'),
            fetchTasks(taskURLs.weekly, 'weekly-list'),
            fetchTasks(taskURLs.monthly, 'monthly-list')
        ]).then(() => {
            document.getElementById("todo-sync-status").innerText = "All tasks up to date: " + new Date().toLocaleTimeString();
        });
    }

    function closeTodo() {
        document.getElementById("todoModal").style.display = "none";
    }

    // --- FILTER & RENDER LOGIC ---
    function toggleFilter(type) {
        currentFilter = (currentFilter === type) ? 'all' : type;
        document.getElementById('lowStockBtn').classList.toggle('active-low', currentFilter === 'low');
        document.getElementById('outStockBtn').classList.toggle('active-out', currentFilter === 'out');
        filterAndRender();
        focusSearch();
    }

    function toggleExclusion(type) {
        exclusions[type] = !exclusions[type];
        let btnId = type === 'low' ? 'hideLowBtn' : (type === 'out' ? 'hideOutBtn' : 'hideZeroBtn');
        document.getElementById(btnId).classList.toggle('active-exclude', exclusions[type]);
        filterAndRender();
        focusSearch();
    }

    function toggleSort() {
        if (sortDirection === 'none') { sortDirection = 'asc'; document.getElementById('sortBtn').innerHTML = '🔽 Price: L'; }
        else if (sortDirection === 'asc') { sortDirection = 'desc'; document.getElementById('sortBtn').innerHTML = '🔼 Price: H'; }
        else { sortDirection = 'none'; document.getElementById('sortBtn').innerHTML = '↕️ Price'; }
        filterAndRender();
        focusSearch();
    }

    function resetAllFilters() {
        document.getElementById("searchInput").value = "";
        document.getElementById("minPrice").value = "";
        document.getElementById("maxPrice").value = "";
        currentFilter = 'all';
        exclusions = { low: false, out: false, zero: false };
        sortDirection = 'none';
        ['lowStockBtn', 'outStockBtn', 'hideLowBtn', 'hideOutBtn', 'hideZeroBtn'].forEach(id => {
            document.getElementById(id).classList.remove('active-low', 'active-out', 'active-exclude');
        });
        document.getElementById('sortBtn').innerHTML = '↕️ Price';
        filterAndRender();
        focusSearch();
    }

    function filterAndRender() {
        let filtered = [...products];
        const searchInput = document.getElementById("searchInput").value.toLowerCase().trim();
        const minP = parseFloat(document.getElementById("minPrice").value) || 0;
        const maxP = parseFloat(document.getElementById("maxPrice").value) || Infinity;

        if (searchInput) {
            const searchTerms = searchInput.split(/\s+/);
            const includeTerms = searchTerms.filter(t => !t.startsWith('-'));
            const excludeTerms = searchTerms.filter(t => t.startsWith('-')).map(t => t.substring(1));
            filtered = filtered.filter(p => {
                const name = p.name.toLowerCase();
                const matchesInclude = includeTerms.every(term => name.includes(term));
                const matchesExclude = excludeTerms.some(term => term !== "" && name.includes(term));
                return matchesInclude && !matchesExclude;
            });
        }

        filtered = filtered.filter(p => p.price >= minP && p.price <= maxP);
        if (exclusions.low) filtered = filtered.filter(p => !(p.stock > 0 && p.stock <= 5));
        if (exclusions.out) filtered = filtered.filter(p => p.stock > 0);
        if (exclusions.zero) filtered = filtered.filter(p => p.price > 0);
        if (currentFilter === 'low') filtered = filtered.filter(p => p.stock > 0 && p.stock <= 5);
        else if (currentFilter === 'out') filtered = filtered.filter(p => p.stock <= 0);

        if (sortDirection === 'asc') filtered.sort((a, b) => a.price - b.price);
        else if (sortDirection === 'desc') filtered.sort((a, b) => b.price - a.price);

        currentlyFiltered = filtered;
        document.getElementById('item-count').innerText = filtered.length;
        render(filtered);
    }

    function render(items) {
        const list = document.getElementById("product-list");
        if(items.length === 0) {
            list.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color:var(--text-dim); margin-top: 40px;">No items found matching filters.</p>`;
            return;
        }
        list.innerHTML = items.map(p => `
            <div class="card">
                <div>
                    <h3 style="margin:0 0 5px 0; font-size:1rem;">${p.name}</h3>
                    <div class="price-tag"><span>₹</span>${p.price.toLocaleString()}</div>
                </div>
                <div>${getStockBadge(p.stock)}</div>
            </div>
        `).join("");
    }

    function getStockBadge(qty) {
        if (qty > 5) return `<span class="badge in-stock">Stock: ${qty}</span>`;
        if (qty > 0) return `<span class="badge low-stock">Low Stock: ${qty}</span>`;
        return `<span class="badge out-stock">Out of Stock</span>`;
    }

    function exportToExcel() {
        if (currentlyFiltered.length === 0) return alert("Nothing to export!");
        const data = currentlyFiltered.map(p => ({
            "Product Name": p.name,
            "Stock Level": p.stock,
            "Status": p.stock <= 0 ? "Out of Stock" : (p.stock <= 5 ? "Low" : "Available"),
            "Price": p.price
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Inventory");
        XLSX.writeFile(wb, "BC_Stock_Export.xlsx");
    }

    function exportToPDF() {
        if (currentlyFiltered.length === 0) return alert("Nothing to export!");
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(18);
        doc.text("BC STOCK Inventory Report", 14, 20);
        const rows = currentlyFiltered.map(p => [p.name, p.stock, `Rs. ${p.price.toLocaleString()}`]);
        doc.autoTable({
            head: [['Product Name', 'Qty', 'Price']],
            body: rows,
            startY: 35,
            theme: 'striped',
            headStyles: { fillColor: [255, 71, 87] }
        });
        doc.save("BC_Stock_Report.pdf");
    }

    function focusSearch() { document.getElementById("searchInput").focus(); }
    function quickCalc() {
        const input = document.getElementById('calcInput');
        const display = document.getElementById('calcResult');
        const val = input.value.trim();
        if (!val) { display.innerText = ""; return; }
        try {
            const result = Function(`'use strict'; return (${val})`)();
            display.innerText = (result !== undefined && !isNaN(result)) ? "= " + (Number.isInteger(result) ? result : result.toFixed(2)) : "";
        } catch (e) { display.innerText = ""; }
    }

    window.onclick = function(event) {
        if (event.target == document.getElementById("todoModal")) closeTodo();
        if (event.target == document.getElementById("reminderModal")) closeReminder();
    }

    // Start App
    loadData();
    loadReminders();
</script>
</body>
</html>
